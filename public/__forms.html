<!DOCTYPE html>
<html>
<body>
  <!--
    Netlify Forms registration page. Do not delete.
    Netlify's build bot crawls this file at deploy time and registers the
    'early-access' form schema (including all field names).
    Actual submissions are POSTed from src/components/ui/EarlyAccessModal.tsx
    to '/' with Content-Type: application/x-www-form-urlencoded and the
    'form-name=early-access' field, per Netlify Forms spec.
  -->
  <form name="early-access" data-netlify="true" netlify-honeypot="bot-field" hidden>
    <input type="email" name="email" />
    <input type="text" name="plan" />
    <input type="text" name="keyword" />
    <input type="text" name="landing" />
    <input type="text" name="locale" />
    <input type="text" name="gdprConsent" />
    <input type="text" name="bot-field" />
  </form>
</body>
</html>
